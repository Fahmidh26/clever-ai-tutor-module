services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      AISITE_OAUTH_INTERNAL_URL: http://host.docker.internal:8000/
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8003:8003"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8003
    depends_on:
      - backend
    ports:
      - "5174:80"
